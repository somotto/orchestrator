name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install pytest pytest-cov flake8
        pip install -r srcs/inventory-app/requirements.txt
        pip install -r srcs/billing-app/requirements.txt
        pip install -r srcs/api-gateway-app/requirements.txt
    
    - name: Lint with flake8
      run: |
        flake8 srcs/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 srcs/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run tests
      run: |
        echo "Add your tests here"
        # pytest tests/ --cov=srcs --cov-report=xml

  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service:
          - name: api-gateway
            context: srcs/api-gateway-app
          - name: inventory-app
            context: srcs/inventory-app
          - name: billing-app
            context: srcs/billing-app
          - name: postgres-db
            context: srcs/postgres-db
          - name: rabbitmq
            context: srcs/rabbitmq
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.service.context }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
    
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > kubeconfig
        echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV
    
    - name: Update image tags
      run: |
        kubectl set image deployment/api-gateway \
          api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:develop-${{ github.sha }} \
          -n orchestrator
        kubectl set image deployment/inventory-app \
          inventory-app=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/inventory-app:develop-${{ github.sha }} \
          -n orchestrator
        kubectl set image statefulset/billing-app \
          billing-app=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/billing-app:develop-${{ github.sha }} \
          -n orchestrator
    
    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/api-gateway -n orchestrator --timeout=5m
        kubectl rollout status deployment/inventory-app -n orchestrator --timeout=5m
        kubectl rollout status statefulset/billing-app -n orchestrator --timeout=5m

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://orchestrator.example.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
    
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > kubeconfig
        echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV
    
    - name: Update image tags
      run: |
        kubectl set image deployment/api-gateway \
          api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:latest \
          -n orchestrator
        kubectl set image deployment/inventory-app \
          inventory-app=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/inventory-app:latest \
          -n orchestrator
        kubectl set image statefulset/billing-app \
          billing-app=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/billing-app:latest \
          -n orchestrator
    
    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/api-gateway -n orchestrator --timeout=5m
        kubectl rollout status deployment/inventory-app -n orchestrator --timeout=5m
        kubectl rollout status statefulset/billing-app -n orchestrator --timeout=5m
    
    - name: Verify deployment
      run: |
        kubectl get pods -n orchestrator
        kubectl get hpa -n orchestrator
